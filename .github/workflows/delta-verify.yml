name: DELTA Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  delta-public-proof-verification:
    name: DELTA public proof verification
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

          python -m pip install cryptography pynacl jsonschema

      - name: Run DELTA baseline verification
        shell: bash
        run: |
          python src/delta_cli.py verify-all

      - name: Write DELTA verification summary
        if: always()
        shell: bash
        run: |
          {
            echo "# DELTA Verify"
            echo ""
            echo "Command:"
            echo ""
            echo "\`\`\`text"
            echo "python src/delta_cli.py verify-all"
            echo "\`\`\`"
            echo ""
            echo "This workflow verifies public DELTA proof artifacts included in the repository."
            echo ""
            echo "Security boundary:"
            echo ""
            echo "- no private keys are required"
            echo "- no private payloads are required"
            echo "- no JSON files are uploaded to a third-party service by DELTA"
            echo "- verification runs inside GitHub Actions using repository files"
          } >> "$GITHUB_STEP_SUMMARY"
