name: DELTA Verify

on:
  push:
    branches:
      - main
      - "release/**"
      - "integrations/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  delta-verify:
    name: DELTA public proof verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository byte-exact
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assert DELTA byte-exact Git policy
        shell: bash
        run: |
          test -f .gitattributes
          grep -q '^\* -text$' .gitattributes
          git check-attr text -- src/genesis_generator.py | tee /tmp/delta-git-attr.txt
          grep -q 'text: unset' /tmp/delta-git-attr.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install DELTA dependencies
        run: python -m pip install cryptography

      - name: Verify DELTA public proofs
        run: python src/delta_cli.py verify-all

      - name: Write DELTA verification summary
        if: always()
        shell: bash
        run: |
          {
            echo "## DELTA Verify"
            echo ""
            echo "Command:"
            echo ""
            echo '```text'
            echo "python src/delta_cli.py verify-all"
            echo '```'
            echo ""
            echo "This workflow verifies public DELTA proof artifacts included in the repository."
            echo ""
            echo "Security boundary:"
            echo ""
            echo "- no private keys are required"
            echo "- no private payloads are required"
            echo "- no JSON files are uploaded to a third-party service by DELTA"
            echo "- verification runs inside GitHub Actions using repository files"
          } >> "$GITHUB_STEP_SUMMARY"
