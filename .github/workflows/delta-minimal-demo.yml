name: DELTA Minimal Public Demo

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  minimal-tamper-detection-demo:
    name: Minimal tamper-detection demo
    runs-on: windows-latest

    steps:
      - name: Run minimal hash-based tamper-detection demo
        shell: cmd
        run: |
          echo DELTA Protocol minimal public demo artifact.> "%RUNNER_TEMP%\delta-demo-original.txt"
          echo This file is intentionally simple so that tampering is easy to detect.>> "%RUNNER_TEMP%\delta-demo-original.txt"

          for /f "skip=1 tokens=* delims=" %%H in ('certutil -hashfile "%RUNNER_TEMP%\delta-demo-original.txt" SHA256 ^| findstr /v /i "CertUtil hash"') do set "ORIGINAL_HASH=%%H"

          copy "%RUNNER_TEMP%\delta-demo-original.txt" "%RUNNER_TEMP%\delta-demo-tampered.txt"
          echo TAMPERED>> "%RUNNER_TEMP%\delta-demo-tampered.txt"

          for /f "skip=1 tokens=* delims=" %%H in ('certutil -hashfile "%RUNNER_TEMP%\delta-demo-tampered.txt" SHA256 ^| findstr /v /i "CertUtil hash"') do set "TAMPERED_HASH=%%H"

          echo Original hash: %ORIGINAL_HASH%
          echo Tampered hash: %TAMPERED_HASH%

          if "%ORIGINAL_HASH%"=="%TAMPERED_HASH%" (
            echo ERROR: Tampering was not detected.
            exit /b 1
          )

          echo OK: Original and tampered hashes differ.
          echo OK: Tamper detection succeeded.
          exit /b 0
