[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "delta-protocol"
version = "1.2.1"
description = "DELTA Protocol SDK Core: canonical JSON, SHA-256 commitments, and Ed25519 detached signature verification."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "See repository license" }
authors = [
  { name = "DELTA Protocol Authors" }
]
keywords = [
  "delta",
  "proof-of-change",
  "cryptography",
  "ed25519",
  "sha256",
  "canonical-json",
  "audit"
]
dependencies = [
  "cryptography>=41"
]

[project.urls]
Homepage = "https://github.com/tomaszluszcz83-ship-it/delta-protocol"
WebExplorer = "https://tomaszluszcz83-ship-it.github.io/delta-protocol/"
Specification = "https://github.com/tomaszluszcz83-ship-it/delta-protocol/tree/main/docs/spec"

[tool.setuptools.packages.find]
where = ["src"]
